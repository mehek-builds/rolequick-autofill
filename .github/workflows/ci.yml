name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this job only needs to read the code (S1).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run compile
      # vitest already exits non-zero on zero test files, so no separate guard is needed here.
      - name: Test
        run: npm test
